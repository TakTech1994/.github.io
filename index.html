<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安藤ゆかり — Yukari Ando</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&amp;family=Noto+Serif+JP:wght@200;300;400&amp;family=Cinzel:wght@400;500&amp;family=Shippori+Mincho:wght@400;500;600&amp;family=Zen+Old+Mincho:wght@400;500;600&amp;family=Kaisei+HarunoUmi:wght@400;500;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* SVG filter for brush/rough texture */
  .brush-text {
    filter: url(#roughen);
  }

  :root {
    --cream: #FDF0F5;
    --ink: #2d1a22;
    --muted: #8a6070;
    --accent: #c47fa0;
    --line: #e8c8d8;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 3rem;
    border-bottom: 0.5px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--cream);
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    font-style: normal;
  }

  .nav-logo span {
    display: block;
    font-size: 0.72rem;
    font-style: normal;
    font-family: 'Shippori Mincho', serif;
    letter-spacing: 0.3em;
    color: var(--muted);
    font-weight: 400;
    margin-top: 3px;
  }

  .nav-links {
    display: flex;
    gap: 3rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.94rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.3s;
    font-weight: 400;
    font-family: 'Cinzel', serif;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--ink);
  }

  .page { display: none; animation: fadeIn 0.5s ease; }
  .page.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* HOME */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 80px);
  }

  .hero-text {
    padding: 5rem 3rem 5rem 3rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-eyebrow {
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    color: var(--accent);
    font-weight: 400;
    font-family: 'Cinzel', serif;
    margin-bottom: 2rem;
  }

  .hero-title {
    font-family: 'Zen Old Mincho', serif;
    font-size: 4.8rem;
    font-weight: 400;
    line-height: 1.25;
    letter-spacing: 0.12em;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }

  .hero-title .char {
    display: inline-block;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .hero-title .char:hover {
    color: var(--accent);
    transform: translateY(-4px) rotate(-3deg) scale(1.08);
  }

  .hero-title .c1 { transform: rotate(-2deg) translateY(2px); }
  .hero-title .c2 { transform: rotate(1.5deg) translateY(-3px); font-size: 1.08em; }
  .hero-title .c3 { transform: rotate(-1deg) translateY(4px); color: var(--accent); }
  .hero-title .c4 { transform: rotate(2deg) translateY(-2px); font-size: 0.92em; }
  .hero-title .c5 { transform: rotate(-1.5deg) translateY(3px); }

  .hero-subtitle {
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    font-weight: 200;
    margin-bottom: 3rem;
  }

  .hero-desc {
    font-size: 0.85rem;
    line-height: 2;
    color: var(--muted);
    max-width: 380px;
    font-weight: 300;
  }

  .hero-cta {
    margin-top: 3rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .btn-primary {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--cream);
    background: var(--ink);
    padding: 0.9rem 2.2rem;
    cursor: pointer;
    border: none;
    border-radius: 2rem;
    font-family: 'Cinzel', serif;
    font-weight: 400;
    position: relative;
    overflow: hidden;
    transition: background 0.3s, box-shadow 0.3s;
    box-shadow: 0 2px 0 var(--accent);
  }

  .btn-primary:hover {
    background: var(--accent);
    box-shadow: 0 4px 12px rgba(196, 127, 160, 0.4);
  }

  .btn-primary:active {
    box-shadow: 0 1px 0 var(--accent);
  }

  .btn-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Noto Serif JP', serif;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .hero-links {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 0.5px solid var(--line);
    max-width: 380px;
  }

  .hero-links-label {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--accent);
    font-weight: 300;
    margin-bottom: 1rem;
  }

  .hero-link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-bottom: 0.5px solid var(--line);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .hero-link-item:hover { opacity: 0.6; }

  .hero-link-name {
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.05em;
    font-family: 'Noto Serif JP', serif;
  }

  .hero-link-arrow {
    font-size: 0.8rem;
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
  }

  .hero-visual {
    background: #fde8f0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-visual-inner {
    text-align: center;
  }

  .portrait-placeholder {
    width: 260px;
    height: 340px;
    background: linear-gradient(160deg, #f5c8dc 0%, #e8a8c8 100%);
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .portrait-placeholder::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 12px;
    right: -12px;
    top: 12px;
    border: 0.5px solid var(--accent);
    z-index: -1;
  }

  .portrait-note {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    font-weight: 200;
  }


  /* NEWS PAGE */
  .page-header {
    padding: 4rem 3rem 2rem;
    border-bottom: 0.5px solid var(--line);
  }

  .page-header-inner {
    display: flex;
    align-items: baseline;
    gap: 2rem;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    font-style: italic;
  }

  .page-title-ja {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    font-weight: 200;
  }

  .news-list {
    padding: 0 3rem;
  }

  .news-item {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 2rem;
    padding: 2.5rem 0;
    border-bottom: 0.5px solid var(--line);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .news-item:hover { opacity: 0.7; }

  .news-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--muted);
    padding-top: 0.2rem;
  }

  .news-category {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    border: 0.5px solid var(--accent);
    padding: 0.2rem 0.6rem;
    margin-bottom: 0.7rem;
    font-weight: 300;
  }

  .news-headline {
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.7;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .news-body {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.9;
    font-weight: 200;
  }

  /* SCHEDULE PAGE */
  .schedule-filter {
    padding: 2rem 3rem 0;
    display: flex;
    gap: 2rem;
  }

  .filter-btn {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding-bottom: 0.5rem;
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    border-bottom: 0.5px solid transparent;
    transition: all 0.2s;
  }

  .filter-btn.active,
  .filter-btn:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  .schedule-list { padding: 1rem 3rem; }

  .month-group { margin-bottom: 2.5rem; }

  .month-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--line);
  }

  .event-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 1.5rem;
    padding: 1.2rem 0;
    border-bottom: 0.5px solid var(--line);
    align-items: center;
  }

  .event-day {
    text-align: center;
  }

  .event-day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    line-height: 1;
  }

  .event-day-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 200;
  }

  .event-name {
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  .event-venue {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 200;
    letter-spacing: 0.05em;
  }

  .event-tag {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 0.25rem 0.8rem;
    border: 0.5px solid var(--line);
    color: var(--muted);
    font-weight: 200;
    white-space: nowrap;
  }

  .event-tag.solo { border-color: var(--accent); color: var(--accent); }

  /* PROFILE PAGE */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 0;
    min-height: calc(100vh - 180px);
  }

  .profile-visual {
    background: #fde8f0;
    padding: 4rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .profile-portrait {
    width: 220px;
    height: 280px;
    background: linear-gradient(160deg, #f5c8dc 0%, #e8a8c8 100%);
    margin-bottom: 2rem;
    position: relative;
  }

  .profile-portrait::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 10px;
    right: -10px;
    top: 10px;
    border: 0.5px solid var(--accent);
    z-index: -1;
  }

  .profile-name-block {
    text-align: center;
  }

  .profile-name-ja {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    margin-bottom: 0.4rem;
  }

  .profile-name-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  .profile-content {
    padding: 4rem 3rem;
    border-left: 0.5px solid var(--line);
  }

  .profile-section { margin-bottom: 3rem; }

  .profile-section-label {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--accent);
    font-weight: 300;
    margin-bottom: 1rem;
  }

  .profile-text {
    font-size: 0.83rem;
    line-height: 2.2;
    font-weight: 300;
    color: var(--ink);
  }

  .profile-awards {
    list-style: none;
  }

  .profile-awards li {
    font-size: 0.8rem;
    line-height: 1.8;
    font-weight: 300;
    color: var(--muted);
    padding-left: 1rem;
    position: relative;
  }

  .profile-awards li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .instruments-list {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .instrument-tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    border: 0.5px solid var(--line);
    padding: 0.4rem 1rem;
    font-weight: 200;
  }

  /* ============================== */
  /*  SMARTPHONE (max-width: 768px) */
  /* ============================== */
  @media (max-width: 768px) {
    /* NAV */
    nav {
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
    }
    .nav-logo {
      font-size: 1.15rem;
      letter-spacing: 0.15em;
    }
    .nav-logo span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
    }
    .nav-links {
      width: 100%;
      gap: 1.2rem;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .nav-links a {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }

    /* HOME / HERO -- 縦積み */
    .hero {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .hero-visual {
      order: -1; /* 画像を上に */
      padding: 2.5rem 1.25rem;
      min-height: auto;
    }
    .hero-visual-inner img {
      width: 220px !important;
      height: 290px !important;
    }
    .hero-text {
      padding: 2.5rem 1.25rem 3rem;
      align-items: flex-start;
    }
    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      margin-bottom: 1.25rem;
    }
    .hero-title {
      font-size: 3.2rem;
      letter-spacing: 0.08em;
      line-height: 1.3;
    }
    .hero-subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      margin-bottom: 2rem;
    }
    .hero-desc {
      font-size: 0.85rem;
      line-height: 1.95;
      max-width: 100%;
    }
    .hero-cta {
      margin-top: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .btn-primary {
      padding: 0.85rem 1.8rem;
    }
    .hero-links {
      max-width: 100%;
      margin-top: 2rem;
    }

    /* COMMON PAGE HEADER */
    .page-header {
      padding: 2.5rem 1.25rem 1.5rem;
    }
    .page-header-inner {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
    }
    .page-title {
      font-size: 2.2rem;
    }
    .page-title-ja {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
    }

    /* NEWS -- 日付を上に縦積み */
    .news-list {
      padding: 0 1.25rem;
    }
    .news-item {
      grid-template-columns: 1fr;
      gap: 0.75rem;
      padding: 1.75rem 0;
    }
    .news-date {
      font-size: 0.85rem;
    }
    .news-headline {
      font-size: 0.92rem;
      line-height: 1.65;
    }
    .news-body {
      font-size: 0.78rem;
      line-height: 1.85;
    }

    /* SCHEDULE */
    .schedule-filter {
      padding: 1.25rem 1.25rem 0;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 0.7rem;
    }
    .schedule-list {
      padding: 1rem 1.25rem;
    }
    .month-label {
      font-size: 1.2rem;
    }
    /* 日付・内容・タグを縦積みに */
    .event-item {
      grid-template-columns: 60px 1fr;
      grid-template-areas:
        "day info"
        "tag tag";
      gap: 0.75rem 1rem;
      padding: 1.1rem 0;
      align-items: start;
    }
    .event-day { grid-area: day; }
    .event-info { grid-area: info; }
    .event-tag {
      grid-area: tag;
      justify-self: start;
      margin-top: 0.25rem;
    }
    .event-day-num {
      font-size: 1.6rem;
    }
    .event-name {
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .event-venue {
      font-size: 0.72rem;
      line-height: 1.6;
    }

    /* PROFILE -- 画像を上に縦積み */
    .profile-grid {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .profile-visual {
      padding: 2.5rem 1.25rem;
    }
    .profile-portrait {
      width: 200px !important;
      height: 260px !important;
      margin-bottom: 1.5rem;
    }
    .profile-name-ja {
      font-size: 1.2rem;
      letter-spacing: 0.25em;
    }
    .profile-name-en {
      font-size: 0.8rem;
    }
    .profile-content {
      padding: 2.5rem 1.25rem;
      border-left: none;
      border-top: 0.5px solid var(--line);
    }
    .profile-section {
      margin-bottom: 2.25rem;
    }
    .profile-text {
      font-size: 0.85rem;
      line-height: 2;
    }
    .profile-awards li {
      font-size: 0.8rem;
      line-height: 1.85;
    }
    .instruments-list {
      gap: 0.5rem;
    }
    .instrument-tag {
      font-size: 0.68rem;
      padding: 0.35rem 0.85rem;
    }
  }

  /* さらに小さい端末向けの微調整 */
  @media (max-width: 380px) {
    .hero-title {
      font-size: 2.7rem;
    }
    .nav-links {
      gap: 0.9rem;
    }
    .nav-links a {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
    }
  }

  .event-arrow {
    font-size: 0.8rem;
    color: var(--muted);
    align-self: center;
    transition: color 0.2s, transform 0.2s;
  }
  .event-item:hover .event-arrow { color: var(--accent); transform: translateX(3px); }
  .event-item { transition: background 0.15s; }
  .event-item:hover { background: var(--cream); }


  /* URL表示スタイル */
  /* URL表示スタイル */
  .detail-url-wrap { display: flex; align-items: baseline; gap: 1rem; margin-top: 1.5rem; padding: 0.9rem 1rem; background: var(--cream); border-left: 2px solid var(--line); }
  .detail-url-label { display: none; }
  .detail-url-text { font-size: 0.78rem; color: var(--accent); word-break: break-all; text-decoration: none; }
  .detail-url-text:hover { text-decoration: underline; }
  .news-item-url { display: block; font-size: 0.72rem; color: var(--accent); margin-top: 0.3rem; word-break: break-all; text-decoration: none; }
  .news-item-url:hover { text-decoration: underline; }
  /* NEWS DETAIL PAGE */
  #page-news-detail .page-header { padding: 2rem 1.5rem 1.5rem; border-bottom: 0.5px solid var(--line); }
  .news-detail-wrap { max-width: 900px; margin: 0 auto; padding: 1.25rem 0.75rem 2rem; }
  .news-detail-image { width: 100%; max-height: 420px; object-fit: cover; display: block; margin-bottom: 2rem; }
  .news-detail-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .news-detail-date { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; letter-spacing: 0.15em; color: var(--muted); }
  .news-detail-cat { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--accent); border: 0.5px solid var(--accent); padding: 0.2rem 0.6rem; }
  .news-detail-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; font-style: italic; line-height: 1.4; color: var(--ink); margin-bottom: 1.5rem; }
  .news-detail-divider { border: none; border-top: 0.5px solid var(--line); margin: 1.5rem 0; }
  .news-detail-body { font-size: 0.9rem; line-height: 2.1; color: var(--ink); white-space: pre-wrap; }

  /* ニュース一覧クリック可能 */
  .news-item { cursor: pointer; transition: background 0.15s; }
  .news-item:hover { background: var(--cream); }
  .news-item-arrow { font-size: 0.8rem; color: var(--muted); margin-left: auto; padding-left: 1rem; align-self: center; transition: color 0.2s, transform 0.2s; }
  .news-item:hover .news-item-arrow { color: var(--accent); transform: translateX(3px); }
  @media (max-width: 768px) {
    .news-detail-wrap { padding: 0.75rem 0.75rem 1.5rem; }
    .news-detail-title { font-size: 1.5rem; }
    #page-news-detail .page-header { padding: 1.5rem 1.25rem 1rem; }
  }

  /* SCHEDULE ソート */
  .schedule-controls { padding: 1.5rem 3rem 0; display: flex; gap: 0; align-items: center; flex-wrap: wrap; }
  .schedule-filter-group { display: flex; gap: 1.5rem; flex: 1; }

    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.995, ctx.currentTime + 0.3);

    gainNode.gain.setValueAtTime(0, ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.04);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

    osc.connect(gainNode);
    gainNode.connect(ctx.destination);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.2);
  }

          '<div><p class="news-headline">' + esc(n.headline) + '</p>' +
          '<p class="news-body">' + esc(bodyShort) + '</p>' +
          (n.linkUrl ? '<a href="' + esc(n.linkUrl) + '" target="_blank" rel="noopener noreferrer" class="news-item-url" onclick="event.stopPropagation();">' + esc(n.linkUrl) + '</a>' : '') +
          '</div></div><span class="news-item-arrow">\u2192</span></div>';
      }).join('');
    }

    
    function renderSchedule(data) {
      const el = document.getElementById('cms-schedule-list');
      if (!el) return;

      // 今日以降のみ表示
      const today = new Date(); today.setHours(0,0,0,0);
      let items = data.schedule.filter(function(e) {
        return new Date(e.year, e.month - 1, e.day) >= today;
      });

      // フィルター
      if (scheduleFilter !== 'ALL') {
        items = items.filter(function(e) { return e.tag === scheduleFilter; });
      }

      // ソート
      items = items.slice().sort(function(a, b) {
        if (scheduleSort === 'DATE_ASC')  return a.year - b.year || a.month - b.month || a.day - b.day;
        if (scheduleSort === 'DATE_DESC') return b.year - a.year || b.month - a.month || b.day - a.day;
        if (scheduleSort === 'NAME')      return esc(a.name).localeCompare(esc(b.name));
        if (scheduleSort === 'TAG')       return esc(a.tag).localeCompare(esc(b.tag));
        return 0;
      });

      if (!items.length) { el.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--muted);font-size:0.85rem;">該当するスケジュールがありません</div>'; return; }

      // 日付順のときだけ月グループ表示
      if (scheduleSort === 'DATE_ASC' || scheduleSort === 'DATE_DESC') {
        const groups = []; let cur = null;
        items.forEach(function(e) {
          const key = e.year + '-' + e.month;
          if (!cur || cur.key !== key) { cur = { key, year: e.year, month: e.month, items: [] }; groups.push(cur); }
          cur.items.push(e);
        });
        el.innerHTML = groups.map(function(g) {
          return "<div class=\"month-group\"><p class=\"month-label\">" + MONTH_NAMES[g.month - 1] + " " + g.year + "</p>" +
            g.items.map(function(e) { return buildEventRow(e); }).join('') + "</div>";
        }).join('');
      } else {
        el.innerHTML = items.map(function(e) { return buildEventRow(e); }).join('');
      }
    }

    function buildEventRow(e) {
      var tagCls = e.tag === "SOLO" ? " solo" : "";
      var ticketHtml = e.ticketUrl
        ? '<a href="' + esc(e.ticketUrl) + '" target="_blank" rel="noopener noreferrer" class="news-item-url" onclick="event.stopPropagation();">' + esc(e.ticketUrl) + '</a>'
        : '';
      return "<div class=\"event-item\" onclick=\"navigateToEvent('" + e.id + "');\" style=\"cursor:pointer;\">" +
        "<div class=\"event-day\"><div class=\"event-day-num\">" + pad2(e.day) + "</div><div class=\"event-day-label\">" + esc(e.weekday) + "</div></div>" +
        "<div class=\"event-info\"><p class=\"event-name\">" + esc(e.name) + "</p><p class=\"event-venue\">" + esc(e.venue) + "</p>" + ticketHtml + "</div>" +
        "<span class=\"event-tag" + tagCls + "\">" + esc(e.tag) + "</span></div>";
    }

    function renderProfile(data) {
      const el = document.getElementById('cms-profile-content');
      if (!el) return;
      const p = (data.profile) || {};
      const nameJa   = p.nameJa   || '';
      const nameEn   = p.nameEn   || '';
      const bio      = p.biography || '';
      const instr    = p.instruments || '';
      const awards   = p.awards   || '';
      const imgUrl   = p.imageUrl || 'profile.jpg';

      const instrTags = instr.split(/[、,，]/).map(s => s.trim()).filter(Boolean)
        .map(s => '<span class="instrument-tag">' + esc(s) + '</span>').join('');

      const awardItems = awards.split('\n').map(s => s.trim()).filter(Boolean)
        .map(s => '<li>' + esc(s) + '</li>').join('');

      el.innerHTML =
        '<div class="profile-grid">' +
          '<div class="profile-visual">' +
            '<img src="' + esc(imgUrl) + '" class="profile-portrait" style="display:block;object-fit:cover;object-position:top;" alt="' + esc(nameJa) + '">' +
            '<div class="profile-name-block">' +
              '<p class="profile-name-ja">' + esc(nameJa) + '</p>' +
              '<p class="profile-name-en">' + esc(nameEn) + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="profile-content">' +
            (bio ? '<div class="profile-section"><p class="profile-section-label">BIOGRAPHY</p><p class="profile-text">' + esc(bio) + '</p></div>' : '') +
            (instrTags ? '<div class="profile-section"><p class="profile-section-label">INSTRUMENTS &amp; SPECIALTY</p><div class="instruments-list">' + instrTags + '</div></div>' : '') +
            (awardItems ? '<div class="profile-section"><p class="profile-section-label">AWARDS &amp; ACTIVITIES</p><ul class="profile-awards">' + awardItems + '</ul></div>' : '') +
          '</div>' +
        '</div>';
    }

    function refresh(d) {
      renderNews(d);
      renderSchedule(d);
      renderProfile(d);
    }

    // フィルター/ソートを外部ボタンから操作できるよう window に公開
    window._cmsSetFilter = function(f) { scheduleFilter = f; };
    window._cmsSetSort   = function(s) { scheduleSort   = s; };
    window._cmsRefresh   = function()  {
      const d = getLocalData();
      renderNews(d);
      renderSchedule(d);
    };

    // まずローカルキャッシュ or デフォルトで即時描画
    refresh(getLocalData());

    // Firebase Firestore からリアルタイム取得
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      var db = firebase.firestore();
      // onSnapshot: 管理者が保存すると全訪問者のページが自動更新される
      db.collection('site').doc('cms').onSnapshot(function(doc) {
        if (doc.exists) {
          var d = doc.data();
          if (d && Array.isArray(d.news) && Array.isArray(d.schedule)) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
            refresh(d);
          }
        }
      }, function(err) {
        console.warn('Firestore snapshot error (using local cache):', err);
      });
    } catch(e) {
      console.warn('Firebase not configured, using local cache:', e.message);
    }

    // BroadcastChannel（ローカル開発時、同じPC・同じブラウザのタブ間同期）
    try {
      var bc = new BroadcastChannel(CHANNEL_NAME);
      bc.addEventListener("message", function(ev) {
        if (ev.data && ev.data.type === "data_updated") refresh(getLocalData());
      });
    } catch(e2) { /* BroadcastChannel未対応ブラウザは無視 */ }
  })();
</script>
